  <style>
    :root{--forest:#2F5848;--forest-deep:#24463A;--cream:#F4EFE6;--ink:#23201B;--bone:#F4EFE6;--bone-dim:#cdd6c8;--clay:#9C5230;--clay-deep:#834525;--serif:"Fraunces",Georgia,serif;--sans:"Inter",-apple-system,sans-serif;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100svh;display:grid;place-items:center;text-align:center;padding:40px 6vw;
      background:radial-gradient(80vmax 60vmax at 50% -10%,var(--forest),var(--forest-deep) 70%);color:var(--bone);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
    .leaf{width:72px;height:72px;margin:0 auto 22px;}
    h1{font-family:var(--serif);font-weight:600;font-size:clamp(40px,9vw,84px);color:#fbfaf3;line-height:1;}
    p{font-size:clamp(17px,2.4vw,20px);color:var(--bone-dim);margin-top:16px;max-width:46ch;margin-inline:auto;line-height:1.7;}
    .btn{display:inline-flex;align-items:center;gap:9px;margin-top:30px;background:linear-gradient(180deg,var(--clay),var(--clay-deep));color:#fff;font-weight:650;font-size:15.5px;padding:14px 26px;border-radius:999px;box-shadow:0 16px 28px -14px rgba(140,69,37,.6);transition:transform .25s;}
    .btn:hover{transform:translateY(-2px);}
    a:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(140,201,95,.5);border-radius:999px;}
  </style>
</head>
